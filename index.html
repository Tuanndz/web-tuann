<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tuann</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background: linear-gradient(135deg, #0f0c1f 0%, #1a1a2e 50%, #16213e 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif;
        }

        /* Iframe phủ toàn bộ màn hình */
        .fullscreen-iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            margin: 0;
            padding: 0;
            display: block;
            opacity: 0;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2;
        }

        .fullscreen-iframe.loaded {
            opacity: 1;
        }

        /* Premium Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0f0c1f 0%, #0a0a1a 100%);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(0px);
        }

        .loading-overlay.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        /* Container chính cho loading animation */
        .loader-container {
            text-align: center;
            position: relative;
            animation: fadeInUp 0.8s ease-out;
        }

        /* Logo animation */
        .premium-logo {
            margin-bottom: 2rem;
            position: relative;
        }

        .logo-icon {
            font-size: 4.5rem;
            filter: drop-shadow(0 0 20px rgba(249, 115, 22, 0.6));
            animation: floatIcon 2s ease-in-out infinite;
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* Gradient ring loader */
        .gradient-ring {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
        }

        .ring-svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .ring-bg {
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 3;
            fill: none;
        }

        .ring-progress {
            stroke: url(#gradientStroke);
            stroke-width: 4;
            fill: none;
            stroke-linecap: round;
            stroke-dasharray: 283;
            stroke-dashoffset: 283;
            animation: drawRing 2.2s ease-in-out infinite;
            filter: drop-shadow(0 0 8px rgba(249, 115, 22, 0.5));
        }

        @keyframes drawRing {
            0% {
                stroke-dashoffset: 283;
            }
            50% {
                stroke-dashoffset: 70;
            }
            100% {
                stroke-dashoffset: 283;
            }
        }

        /* Pulse dots */
        .pulse-dots {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 2rem;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f97316, #facc15);
            animation: pulseDot 1.4s ease-in-out infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes pulseDot {
            0%, 100% {
                transform: scale(0.6);
                opacity: 0.4;
            }
            50% {
                transform: scale(1.2);
                opacity: 1;
                box-shadow: 0 0 15px rgba(249, 115, 22, 0.8);
            }
        }

        /* Text animation */
        .loading-text {
            margin-top: 2rem;
            font-size: 1.1rem;
            font-weight: 500;
            background: linear-gradient(135deg, #f97316, #facc15, #f97316);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmer 2s linear infinite;
            letter-spacing: 1px;
        }

        @keyframes shimmer {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        /* Status message */
        .status-message {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        /* Particle canvas */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10000;
            opacity: 0.5;
        }

        /* Keyframe animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Error notification */
        .error-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(249, 115, 22, 0.4);
            border-radius: 100px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10001;
            font-family: inherit;
            transition: transform 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .error-toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .error-icon {
            font-size: 1.2rem;
        }

        .error-text {
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .gradient-ring {
                width: 100px;
                height: 100px;
            }
            .logo-icon {
                font-size: 3.5rem;
            }
            .loading-text {
                font-size: 0.95rem;
            }
        }

        /* Hide scrollbar on iframe */
        iframe::-webkit-scrollbar {
            width: 8px;
        }

        iframe::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        iframe::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #f97316, #facc15);
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <!-- Particle Canvas Background -->
    <canvas id="particleCanvas"></canvas>

    <!-- Iframe -->
    <iframe 
        class="fullscreen-iframe" 
        src="https://web-tuann.lovable.app/"
        title="Shop Acc Game Premium"
        sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-downloads allow-storage-access-by-user-activation allow-popups-to-escape-sandbox"
        referrerpolicy="strict-origin-when-cross-origin"
        loading="eager"
        importance="high"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    ></iframe>

    <!-- Premium Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader-container">
            <!-- Logo -->
            <div class="premium-logo">
                <div class="logo-icon">😳🔥</div>
            </div>
            
            <!-- Gradient Ring Loader -->
            <div class="gradient-ring">
                <svg class="ring-svg" viewBox="0 0 100 100">
                    <defs>
                        <linearGradient id="gradientStroke" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#f97316"/>
                            <stop offset="50%" stop-color="#facc15"/>
                            <stop offset="100%" stop-color="#f97316"/>
                        </linearGradient>
                    </defs>
                    <circle class="ring-bg" cx="50" cy="50" r="45" />
                    <circle class="ring-progress" cx="50" cy="50" r="45" />
                </svg>
            </div>
            
            <!-- Pulse Dots -->
            <div class="pulse-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            
            <!-- Loading Text -->
            <div class="loading-text" id="loadingText">
                ĐANG TẢI TRẢI NGHIỆM CAO CẤP
            </div>
            <div class="status-message" id="statusMessage">
                Chuẩn bị kho tài khoản game...
            </div>
        </div>
    </div>

    <script>
        (function() {
            const iframe = document.querySelector('.fullscreen-iframe');
            const overlay = document.getElementById('loadingOverlay');
            const loadingText = document.getElementById('loadingText');
            const statusMessage = document.getElementById('statusMessage');
            
            // Danh sách các status message thú vị
            const statusMessages = [
                "Kích hoạt máy chủ siêu tốc...",
                "Sạc pin giao dịch tự động...",
                "Mở kho bảo mật AES-256...",
                "Kết nối hệ thống 24/7...",
                "Chuẩn bị kho tài khoản game...",
                "Khởi tạo giao diện cao cấp...",
                "Đồng bộ dữ liệu an toàn...",
                "Sẵn sàng trải nghiệm đỉnh cao..."
            ];
            
            let messageIndex = 0;
            let messageInterval;
            
            // Hàm thay đổi status message mượt mà
            function rotateStatusMessages() {
                if (!statusMessage) return;
                messageInterval = setInterval(() => {
                    messageIndex = (messageIndex + 1) % statusMessages.length;
                    statusMessage.style.opacity = '0';
                    setTimeout(() => {
                        statusMessage.textContent = statusMessages[messageIndex];
                        statusMessage.style.opacity = '1';
                    }, 200);
                }, 1800);
            }
            
            // Bắt đầu xoay vòng message
            rotateStatusMessages();
            
            // Hàm ẩn loading với hiệu ứng cao cấp
            function hideLoading() {
                if (!overlay) return;
                
                // Dừng xoay vòng message
                if (messageInterval) {
                    clearInterval(messageInterval);
                }
                
                // Thêm class fade-out
                overlay.classList.add('fade-out');
                
                // Hiển thị iframe với hiệu ứng fade
                iframe.classList.add('loaded');
                
                // Sau animation, xóa overlay khỏi DOM
                setTimeout(() => {
                    if (overlay && overlay.parentNode) {
                        overlay.style.display = 'none';
                    }
                }, 800);
            }
            
            // Xử lý khi iframe load thành công
            if (iframe) {
                // Tăng tốc độ load bằng cách preload nhẹ
                iframe.addEventListener('load', function() {
                    // Thêm độ trễ nhỏ để animation loading hoàn tất mượt
                    setTimeout(() => {
                        hideLoading();
                    }, 300);
                });
                
                // Xử lý lỗi
                iframe.addEventListener('error', function() {
                    console.warn('⚠️ Lỗi tải nội dung');
                    clearInterval(messageInterval);
                    
                    // Hiển thị thông báo lỗi cao cấp
                    showErrorToast();
                    
                    // Vẫn ẩn loading sau 1 giây để hiển thị iframe error
                    setTimeout(() => {
                        hideLoading();
                    }, 1000);
                });
                
                // Fallback: nếu load quá lâu (3.5 giây) vẫn ẩn loading
                setTimeout(() => {
                    if (overlay && overlay.style.display !== 'none') {
                        hideLoading();
                    }
                }, 3800);
            } else {
                hideLoading();
            }
            
            // Hiển thị toast thông báo lỗi
            function showErrorToast() {
                const toast = document.createElement('div');
                toast.className = 'error-toast';
                toast.innerHTML = `
                    <span class="error-icon">⚠️</span>
                    <span class="error-text">Kết nối chậm, nhưng trải nghiệm vẫn đang được tối ưu...</span>
                `;
                document.body.appendChild(toast);
                
                // Animation hiển thị
                setTimeout(() => {
                    toast.classList.add('show');
                }, 100);
                
                // Tự động ẩn sau 4 giây
                setTimeout(() => {
                    toast.classList.remove('show');
                    setTimeout(() => {
                        if (toast.parentNode) toast.remove();
                    }, 400);
                }, 4000);
            }
            
            // ========== PARTICLE SYSTEM (HIỆU ỨNG HẠT CAO CẤP) ==========
            const canvas = document.getElementById('particleCanvas');
            let ctx = canvas.getContext('2d');
            let particles = [];
            let animationFrameId;
            
            function initParticles() {
                if (!canvas) return;
                
                const resizeCanvas = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };
                resizeCanvas();
                window.addEventListener('resize', resizeCanvas);
                
                // Tạo particle
                const particleCount = 80;
                for (let i = 0; i < particleCount; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        radius: Math.random() * 3 + 1,
                        alpha: Math.random() * 0.5 + 0.2,
                        speedX: (Math.random() - 0.5) * 0.3,
                        speedY: (Math.random() - 0.5) * 0.2,
                        color: `hsl(${Math.random() * 30 + 20}, 80%, 60%)`
                    });
                }
                
                function animateParticles() {
                    if (!canvas || !ctx) return;
                    
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    for (let p of particles) {
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                        ctx.fillStyle = p.color;
                        ctx.globalAlpha = p.alpha;
                        ctx.fill();
                        
                        // Di chuyển
                        p.x += p.speedX;
                        p.y += p.speedY;
                        
                        // Wrap around
                        if (p.x < 0) p.x = canvas.width;
                        if (p.x > canvas.width) p.x = 0;
                        if (p.y < 0) p.y = canvas.height;
                        if (p.y > canvas.height) p.y = 0;
                    }
                    
                    animationFrameId = requestAnimationFrame(animateParticles);
                }
                
                animateParticles();
            }
            
            // Khởi tạo particles chỉ khi loading overlay tồn tại
            if (document.getElementById('loadingOverlay')) {
                initParticles();
            }
            
            // Dừng particle animation khi loading kết thúc để tiết kiệm tài nguyên
            const observer = new MutationObserver((mutations) => {
                mutations.forEach((mutation) => {
                    if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
                        if (overlay && overlay.style.display === 'none') {
                            if (animationFrameId) {
                                cancelAnimationFrame(animationFrameId);
                                if (canvas) {
                                    canvas.style.opacity = '0';
                                    setTimeout(() => {
                                        if (canvas.parentNode) canvas.remove();
                                    }, 600);
                                }
                            }
                            observer.disconnect();
                        }
                    }
                });
            });
            
            if (overlay) {
                observer.observe(overlay, { attributes: true });
            }
            
            // Xử lý khi resize để đảm bảo iframe luôn fullscreen
            window.addEventListener('resize', () => {
                if (iframe) {
                    iframe.style.width = '100%';
                    iframe.style.height = '100%';
                }
            });
            
            // Tối ưu hiệu suất: sử dụng passive event listeners
            document.addEventListener('touchstart', () => {}, { passive: true });
            
            // Preload thông minh: tạo cảm giác load nhanh hơn
            const linkPreload = document.createElement('link');
            linkPreload.rel = 'preconnect';
            linkPreload.href = 'https://web-tuann.lovable.app';
            document.head.appendChild(linkPreload);
            
            console.log('✨ Premium loading experience activated');
        })();
    </script>
</body>
  </html>
